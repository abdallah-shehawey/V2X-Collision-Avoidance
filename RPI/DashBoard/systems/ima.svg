    <line x1="44" y1="-24.0" x2="44" y2="24.0" stroke="#08121c" stroke-width="2"/>
    <rect x="59.0" y="-27.0" width="14" height="12" rx="3" fill="#ffe6a8"/>
    <rect x="59.0" y="15.0"  width="14" height="12" rx="3" fill="#ffe6a8"/>
    <rect x="-71.0" y="-28.0" width="9" height="14" rx="3" fill="#ff4d4f" opacity="0.95"/>
    <rect x="-71.0" y="14.0"  width="9" height="14" rx="3" fill="#ff4d4f" opacity="0.95"/>
    <line x1="-70.0" y1="0" x2="-70.0" y2="0" stroke="#ff4d4f" stroke-width="5"/>
  </g>
  <g transform="translate(800,820) rotate(-90) scale(1.0)" filter="url(#glowB)">
    <rect x="-61" y="-46.0" width="34" height="14" rx="6" fill="#070809"/><rect x="-61" y="32.0" width="34" height="14" rx="6" fill="#070809"/><rect x="29" y="-46.0" width="34" height="14" rx="6" fill="#070809"/><rect x="29" y="32.0" width="34" height="14" rx="6" fill="#070809"/>
    
    <rect x="-75.0" y="-37.0" width="150" height="74" rx="26" ry="30"
