    <line x1="-70.0" y1="0" x2="-70.0" y2="0" stroke="#ff4d4f" stroke-width="5"/>
  </g><polygon points="800.0,452.0 806.7,473.9 826.9,463.1 816.1,483.3 838.0,490.0 816.1,496.7 826.9,516.9 806.7,506.1 800.0,528.0 793.3,506.1 773.1,516.9 783.9,496.7 762.0,490.0 783.9,483.3 773.1,463.1 793.3,473.9" fill="#ff4d4f" opacity="0.9" filter="url(#glowR)"/><text x="800" y="496" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="22" font-weight="900" fill="#fff" text-anchor="middle">!</text><g transform="translate(800,955)"><rect x="-53.0" y="-18" width="106" height="32" rx="16" fill="rgba(0,0,0,0.55)" stroke="#4aa6ff" stroke-opacity="0.45" stroke-width="1.5"/><text x="0" y="4" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="18" font-weight="700" fill="#4aa6ff" text-anchor="middle">Your car</text></g><g transform="translate(300,340)"><rect x="-158.0" y="-18" width="316" height="32" rx="16" fill="rgba(0,0,0,0.55)" stroke="#ff4d4f" stroke-opacity="0.45" stroke-width="1.5"/><text x="0" y="4" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="18" font-weight="700" fill="#ff4d4f" text-anchor="middle">Car from a crossing direction</text></g></g>

  <!-- caption -->
  <rect x="14" y="862" width="1572" height="124" rx="22"
        fill="rgba(6,8,12,0.85)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
  <text x="44" y="906" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="23" font-weight="600"
        fill="#e8eaed" text-anchor="start">When approaching an intersection (within 20 m) it detects a car coming from a crossing direction, computes the time to arrival, and warns you of a collision risk.</text>
  <g transform="translate(44,928)"><rect x="0" y="0" width="151" height="40" rx="20" fill="#f5a623" fill-opacity="0.14" stroke="#f5a623" stroke-opacity="0.55" stroke-width="1.5"/><circle cx="22" cy="20" r="6" fill="#f5a623"/><text x="38" y="26" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="17" font-weight="700" fill="#f5a623">within 20 m</text></g><g transform="translate(207,928)"><rect x="0" y="0" width="195" height="40" rx="20" fill="#ff4d4f" fill-opacity="0.14" stroke="#ff4d4f" stroke-opacity="0.55" stroke-width="1.5"/><circle cx="22" cy="20" r="6" fill="#ff4d4f"/><text x="38" y="26" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="17" font-weight="700" fill="#ff4d4f">delay ≤ 4s / 2s</text></g><g transform="translate(414,928)"><rect x="0" y="0" width="228" height="40" rx="20" fill="#4aa6ff" fill-opacity="0.14" stroke="#4aa6ff" stroke-opacity="0.55" stroke-width="1.5"/><circle cx="22" cy="20" r="6" fill="#4aa6ff"/><text x="38" y="26" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="17" font-weight="700" fill="#4aa6ff">crossing direction</text></g><g transform="translate(654,928)"><rect x="0" y="0" width="140" height="40" rx="20" fill="#7c5cff" fill-opacity="0.14" stroke="#7c5cff" stroke-opacity="0.55" stroke-width="1.5"/><circle cx="22" cy="20" r="6" fill="#7c5cff"/><text x="38" y="26" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="17" font-weight="700" fill="#7c5cff">V2V · DSRC</text></g>
</svg>