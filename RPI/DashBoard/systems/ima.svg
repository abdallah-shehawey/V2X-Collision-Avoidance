  <text x="46" y="100" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="19" font-weight="600" fill="#8b93a0">Intersection Movement Assist</text>
  <text x="1556" y="78" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="40" font-weight="800" fill="#e8eaed" text-anchor="end">Intersection Movement Assist</text>
  <line x1="44" y1="120" x2="1556" y2="120" stroke="#4aa6ff" stroke-opacity="0.25" stroke-width="2"/>

  <!-- scene -->
  <g><rect x="-60" y="350" width="1720" height="280" fill="url(#gRoad)"/><line x1="-60" y1="350" x2="1660" y2="350" stroke="#3a3f4a" stroke-width="4"/><line x1="-60" y1="630" x2="1660" y2="630" stroke="#3a3f4a" stroke-width="4"/><rect x="660" y="-60" width="280" height="1120" fill="url(#gRoad)"/><line x1="660" y1="-60" x2="660" y2="1060" stroke="#3a3f4a" stroke-width="4"/><line x1="940" y1="-60" x2="940" y2="1060" stroke="#3a3f4a" stroke-width="4"/><line x1="-60" y1="490" x2="660" y2="490" stroke="#525762" stroke-width="5" stroke-dasharray="46 38" stroke-linecap="round" opacity="0.85"/><line x1="940" y1="490" x2="1660" y2="490" stroke="#525762" stroke-width="5" stroke-dasharray="46 38" stroke-linecap="round" opacity="0.85"/><line x1="800" y1="-60" x2="800" y2="350" stroke="#525762" stroke-width="5" stroke-dasharray="46 38" stroke-linecap="round" opacity="0.85"/><line x1="800" y1="630" x2="800" y2="1060" stroke="#525762" stroke-width="5" stroke-dasharray="46 38" stroke-linecap="round" opacity="0.85"/><circle cx="800" cy="490" r="250" fill="none" stroke="#f5a623" stroke-opacity="0.4" stroke-dasharray="4 12" stroke-width="3"/><text x="800" y="328" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="18" font-weight="700" fill="#f5a623" text-anchor="middle">20 m range from the intersection</text><circle cx="300" cy="490" r="54" fill="none" stroke="#7c5cff" stroke-width="2.6" stroke-dasharray="2 12" opacity="0.55"/><circle cx="300" cy="490" r="100" fill="none" stroke="#7c5cff" stroke-width="2.6" stroke-dasharray="2 12" opacity="0.45"/><circle cx="300" cy="490" r="150" fill="none" stroke="#7c5cff" stroke-width="2.6" stroke-dasharray="2 12" opacity="0.35"/><circle cx="300" cy="490" r="206" fill="none" stroke="#7c5cff" stroke-width="2.6" stroke-dasharray="2 12" opacity="0.25"/><circle cx="300" cy="490" r="270" fill="none" stroke="#7c5cff" stroke-width="2.6" stroke-dasharray="2 12" opacity="0.15"/><g transform="translate(300,214)"><rect x="-44" y="-26" width="88" height="26" rx="13" fill="#7c5cff" opacity="0.16"/><text x="0" y="-7" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="15" font-weight="800" fill="#7c5cff" text-anchor="middle">V2V · DSRC</text></g>
  <g transform="translate(300,490) rotate(0) scale(1.0)" filter="url(#soft)">
    <rect x="-61" y="-46.0" width="34" height="14" rx="6" fill="#070809"/><rect x="-61" y="32.0" width="34" height="14" rx="6" fill="#070809"/><rect x="29" y="-46.0" width="34" height="14" rx="6" fill="#070809"/><rect x="29" y="32.0" width="34" height="14" rx="6" fill="#070809"/>
    
    <rect x="-75.0" y="-37.0" width="150" height="74" rx="26" ry="30"
