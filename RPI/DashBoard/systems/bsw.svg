<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000"
     font-family="'Segoe UI','Noto Sans Arabic',sans-serif" width="1600" height="1000">
  
  <defs>
    <radialGradient id="gBg" cx="50%" cy="34%" r="85%">
      <stop offset="0%"  stop-color="#0e1016"/>
      <stop offset="55%" stop-color="#06070a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="gRoad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#23262e"/>
      <stop offset="50%" stop-color="#1a1c22"/>
      <stop offset="100%" stop-color="#101218"/>
    </linearGradient>
    <linearGradient id="gHost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#6fc0ff"/>
      <stop offset="45%" stop-color="#3f8fe6"/>
      <stop offset="100%" stop-color="#1f4f8f"/>
    </linearGradient>
    <linearGradient id="gThreat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#2b2f38"/>
      <stop offset="45%" stop-color="#16181e"/>
      <stop offset="100%" stop-color="#08090c"/>
    </linearGradient>
    <linearGradient id="gNeutral" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3a3f4a"/>
      <stop offset="50%" stop-color="#272b33"/>
      <stop offset="100%" stop-color="#15171c"/>
    </linearGradient>
    <linearGradient id="gTruck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5b6272"/>
      <stop offset="50%" stop-color="#454b57"/>
      <stop offset="100%" stop-color="#2b2f38"/>
    </linearGradient>
    <linearGradient id="gGlass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#0b1622"/>
      <stop offset="50%" stop-color="#13283d"/>
      <stop offset="100%" stop-color="#0b1622"/>
    </linearGradient>
    <filter id="glowB" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowR" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7"
            markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4aa6ff"/>
    </marker>
    <marker id="arrowW" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7"
            markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f5a623"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1600" height="1000" fill="url(#gBg)"/>
  <rect x="14" y="14" width="1572" height="972" rx="26" fill="none"
        stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- header -->
  <text x="44" y="70" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="50" font-weight="900" fill="#4aa6ff">BSW</text>
  <text x="46" y="100" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="19" font-weight="600" fill="#8b93a0">Blind Spot Warning</text>
  <text x="1556" y="78" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="40" font-weight="800" fill="#e8eaed" text-anchor="end">Blind Spot Warning</text>
  <line x1="44" y1="120" x2="1556" y2="120" stroke="#4aa6ff" stroke-opacity="0.25" stroke-width="2"/>

  <!-- scene -->
  <g><rect x="-60" y="280" width="1720" height="420" fill="url(#gRoad)"/><line x1="-60" y1="280" x2="1660" y2="280" stroke="#3a3f4a" stroke-width="4"/><line x1="-60" y1="700" x2="1660" y2="700" stroke="#3a3f4a" stroke-width="4"/><line x1="-60" y1="490" x2="1660" y2="490" stroke="#525762" stroke-width="5" stroke-dasharray="46 38" stroke-linecap="round" opacity="0.85"/><polygon points="870,560 600,560 600,380 870,450" fill="#f5a623" opacity="0.16"/><polygon points="870,560 600,560 600,380 870,450" fill="none" stroke="#f5a623" stroke-opacity="0.55" stroke-dasharray="8 8" stroke-width="2"/><text x="735" y="470" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="22" font-weight="700" fill="#f5a623" text-anchor="middle">Blind spot</text><circle cx="720" cy="380" r="54" fill="none" stroke="#7c5cff" stroke-width="2.6" stroke-dasharray="2 12" opacity="0.55"/><circle cx="720" cy="380" r="96" fill="none" stroke="#7c5cff" stroke-width="2.6" stroke-dasharray="2 12" opacity="0.45"/><circle cx="720" cy="380" r="142" fill="none" stroke="#7c5cff" stroke-width="2.6" stroke-dasharray="2 12" opacity="0.35"/><g transform="translate(720,232)"><rect x="-44" y="-26" width="88" height="26" rx="13" fill="#7c5cff" opacity="0.16"/><text x="0" y="-7" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="15" font-weight="800" fill="#7c5cff" text-anchor="middle">V2V · DSRC</text></g>
  <g transform="translate(720,380) rotate(0) scale(1.0)" filter="url(#soft)">
    <rect x="-61" y="-46.0" width="34" height="14" rx="6" fill="#070809"/><rect x="-61" y="32.0" width="34" height="14" rx="6" fill="#070809"/><rect x="29" y="-46.0" width="34" height="14" rx="6" fill="#070809"/><rect x="29" y="32.0" width="34" height="14" rx="6" fill="#070809"/>
    
    <rect x="-75.0" y="-37.0" width="150" height="74" rx="26" ry="30"
          fill="url(#gThreat)" stroke="#3c424e" stroke-width="2"/>
    <rect x="-30" y="-25.0" width="74" height="50" rx="16"
          fill="url(#gGlass)" stroke="#0a141f" stroke-width="1.5"/>
    <line x1="44" y1="-24.0" x2="44" y2="24.0" stroke="#08121c" stroke-width="2"/>
    <rect x="59.0" y="-27.0" width="14" height="12" rx="3" fill="#ffe6a8"/>
    <rect x="59.0" y="15.0"  width="14" height="12" rx="3" fill="#ffe6a8"/>
    <rect x="-71.0" y="-28.0" width="9" height="14" rx="3" fill="#ff4d4f" opacity="0.95"/>
    <rect x="-71.0" y="14.0"  width="9" height="14" rx="3" fill="#ff4d4f" opacity="0.95"/>
    <line x1="-70.0" y1="0" x2="-70.0" y2="0" stroke="#ff4d4f" stroke-width="5"/>
  </g>
  <g transform="translate(900,600) rotate(0) scale(1.0)" filter="url(#glowB)">
    <rect x="-61" y="-46.0" width="34" height="14" rx="6" fill="#070809"/><rect x="-61" y="32.0" width="34" height="14" rx="6" fill="#070809"/><rect x="29" y="-46.0" width="34" height="14" rx="6" fill="#070809"/><rect x="29" y="32.0" width="34" height="14" rx="6" fill="#070809"/>
    
    <rect x="-75.0" y="-37.0" width="150" height="74" rx="26" ry="30"
          fill="url(#gHost)" stroke="#bfe2ff" stroke-width="2"/>
    <rect x="-30" y="-25.0" width="74" height="50" rx="16"
          fill="url(#gGlass)" stroke="#0a141f" stroke-width="1.5"/>
    <line x1="44" y1="-24.0" x2="44" y2="24.0" stroke="#08121c" stroke-width="2"/>
    <rect x="59.0" y="-27.0" width="14" height="12" rx="3" fill="#eaf6ff"/>
    <rect x="59.0" y="15.0"  width="14" height="12" rx="3" fill="#eaf6ff"/>
    <rect x="-71.0" y="-28.0" width="9" height="14" rx="3" fill="#ff4d4f" opacity="0.95"/>
    <rect x="-71.0" y="14.0"  width="9" height="14" rx="3" fill="#ff4d4f" opacity="0.95"/>
    <line x1="-70.0" y1="0" x2="-70.0" y2="0" stroke="#ff4d4f" stroke-width="5"/>
  </g><line x1="840" y1="560" x2="840" y2="420" stroke="#f5a623" stroke-width="3" marker-start="url(#arrowW)" marker-end="url(#arrowW)"/><text x="850" y="490" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="18" font-weight="700" fill="#f5a623" text-anchor="start">< 150 cm</text><g transform="translate(930,740)"><rect x="-53.0" y="-18" width="106" height="32" rx="16" fill="rgba(0,0,0,0.55)" stroke="#4aa6ff" stroke-opacity="0.45" stroke-width="1.5"/><text x="0" y="4" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="18" font-weight="700" fill="#4aa6ff" text-anchor="middle">Your car</text></g><g transform="translate(720,200)"><rect x="-118.0" y="-18" width="236" height="32" rx="16" fill="rgba(0,0,0,0.55)" stroke="#ff4d4f" stroke-opacity="0.45" stroke-width="1.5"/><text x="0" y="4" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="18" font-weight="700" fill="#ff4d4f" text-anchor="middle">Car in the blind spot</text></g></g>

  <!-- caption -->
  <rect x="14" y="862" width="1572" height="124" rx="22"
        fill="rgba(6,8,12,0.85)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
  <text x="44" y="906" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="23" font-weight="600"
        fill="#e8eaed" text-anchor="start">Detects a car travelling in your direction that sits in your side blind spot (closer than 150 cm) and warns you before you change lanes.</text>
  <g transform="translate(44,928)"><rect x="0" y="0" width="173" height="40" rx="20" fill="#f5a623" fill-opacity="0.14" stroke="#f5a623" stroke-opacity="0.55" stroke-width="1.5"/><circle cx="22" cy="20" r="6" fill="#f5a623"/><text x="38" y="26" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="17" font-weight="700" fill="#f5a623">side < 150 cm</text></g><g transform="translate(229,928)"><rect x="0" y="0" width="184" height="40" rx="20" fill="#4aa6ff" fill-opacity="0.14" stroke="#4aa6ff" stroke-opacity="0.55" stroke-width="1.5"/><circle cx="22" cy="20" r="6" fill="#4aa6ff"/><text x="38" y="26" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="17" font-weight="700" fill="#4aa6ff">same direction</text></g><g transform="translate(425,928)"><rect x="0" y="0" width="217" height="40" rx="20" fill="#2ecc71" fill-opacity="0.14" stroke="#2ecc71" stroke-opacity="0.55" stroke-width="1.5"/><circle cx="22" cy="20" r="6" fill="#2ecc71"/><text x="38" y="26" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="17" font-weight="700" fill="#2ecc71">left / right side</text></g><g transform="translate(654,928)"><rect x="0" y="0" width="140" height="40" rx="20" fill="#7c5cff" fill-opacity="0.14" stroke="#7c5cff" stroke-opacity="0.55" stroke-width="1.5"/><circle cx="22" cy="20" r="6" fill="#7c5cff"/><text x="38" y="26" font-family="'Segoe UI','Noto Sans Arabic',sans-serif" font-size="17" font-weight="700" fill="#7c5cff">V2V · DSRC</text></g>
</svg>