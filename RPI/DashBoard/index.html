<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V2X Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">

    <!-- ===================== Header ===================== -->
    <header class="topbar">
      <div class="brand">
        <div class="uni-logos">
          <img src="Logo/logo-university.webp" alt="Al-Azhar University" />
          <img src="Logo/logo-faculty.webp" alt="Faculty of Engineering" />
        </div>
        <div class="brand-logo">V2X</div>
        <div>
          <h1 class="brand-title">V2X Collision Avoidance</h1>
          <span class="brand-sub" id="vehicleTag">Vehicle #--</span>
        </div>
      </div>
      <div class="conn" id="conn"><i class="conn-dot"></i> connecting…</div>
    </header>

    <main class="layout">

      <!-- ===================== Top stage ===================== -->
      <section class="stage">

        <!-- ---------- Left column: Speed + Temp tiles, Weather ---------- -->
        <div class="side-col side-left">

          <div class="tile-row">
            <!-- Speed -->
            <div class="card stat speed-tile">
              <div class="stat-label">Speed</div>
              <div class="speedo">
                <svg viewBox="0 0 200 200">
                  <circle class="speedo-track" cx="100" cy="100" r="84"/>
                  <circle class="speedo-value" id="speedoValue" cx="100" cy="100" r="84"/>
                </svg>
                <div class="speedo-center">
                  <strong id="speedValue">--</strong>
                  <small>km/h</small>
                </div>
              </div>
            </div>

            <!-- Cabin temperature -->
            <div class="card stat temp-tile" id="tempCard">
              <div class="stat-label">Cabin</div>
              <div class="temp-icon" id="tempIcon"></div>
              <div class="temp-read"><strong id="vehTemp">--</strong><span class="unit">°C</span></div>
              <div class="temp-state" id="tempState">--</div>
            </div>
          </div>

          <!-- Weather (live + forecast) -->
          <div class="card stat weather-card">
            <div class="stat-label">Weather <span class="wx-city" id="wxCity"></span></div>
            <div class="wx-now">
              <div class="wx-ic" id="weatherIcon"></div>
              <div class="wx-main">
                <div class="wx-temp"><strong id="weatherTemp">--</strong><span class="unit">°C</span></div>
                <div class="wx-cond" id="weatherCond">--</div>
              </div>
              <div class="wx-hum">💧 <b id="weatherHum">--</b>%</div>
            </div>
            <div class="wx-forecast" id="forecast"></div>
          </div>
        </div>

        <!-- ---------- Center: car image + ultrasonic spotlights ---------- -->
        <div class="card car-card">
          <div class="road" id="road">
            <div class="road-plane">
              <div class="lane lane-left"></div>
              <div class="lane lane-center"></div>
              <div class="lane lane-right"></div>
            </div>
            <div class="road-fade"></div>
          </div>
          <div class="car-stage">
          <!-- ultrasonic radar field: rings + 6 colored sectors around the car -->
          <svg class="beams" viewBox="0 0 400 360" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
            <defs>
              <radialGradient id="gSafe" gradientUnits="userSpaceOnUse" cx="0" cy="0" r="172">
                <stop offset="0.06" stop-color="#2ecc71" stop-opacity="0.45"/><stop offset="0.55" stop-color="#2ecc71" stop-opacity="0.16"/><stop offset="1" stop-color="#2ecc71" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="gWarn" gradientUnits="userSpaceOnUse" cx="0" cy="0" r="172">
                <stop offset="0.06" stop-color="#f5a623" stop-opacity="0.75"/><stop offset="0.55" stop-color="#f5a623" stop-opacity="0.32"/><stop offset="1" stop-color="#f5a623" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="gCrit" gradientUnits="userSpaceOnUse" cx="0" cy="0" r="172">
                <stop offset="0.06" stop-color="#ff4d4f" stop-opacity="0.9"/><stop offset="0.55" stop-color="#ff4d4f" stop-opacity="0.42"/><stop offset="1" stop-color="#ff4d4f" stop-opacity="0"/>
              </radialGradient>
            </defs>

            <!-- field laid flat on the ground (vertical squash = perspective) -->
            <g class="field" transform="translate(200 215) scale(1 0.7)">
              <ellipse class="car-shadow" cx="0" cy="0" rx="95" ry="75"/>

              <!-- 6 directional sectors: front 0/±45, rear 180/±45 -->
              <g class="sensor" id="sn-front"      transform="rotate(0)"><path class="beam" d="M-7.2 -18.7 L-61.6 -160.6 A172 172 0 0 1 61.6 -160.6 L7.2 -18.7 A20 20 0 0 0 -7.2 -18.7 Z"/></g>
              <g class="sensor" id="sn-frontLeft"  transform="rotate(-45)"><path class="beam" d="M-7.2 -18.7 L-61.6 -160.6 A172 172 0 0 1 61.6 -160.6 L7.2 -18.7 A20 20 0 0 0 -7.2 -18.7 Z"/></g>
              <g class="sensor" id="sn-frontRight" transform="rotate(45)"><path class="beam" d="M-7.2 -18.7 L-61.6 -160.6 A172 172 0 0 1 61.6 -160.6 L7.2 -18.7 A20 20 0 0 0 -7.2 -18.7 Z"/></g>
              <g class="sensor" id="sn-rear"       transform="rotate(180)"><path class="beam" d="M-7.2 -18.7 L-61.6 -160.6 A172 172 0 0 1 61.6 -160.6 L7.2 -18.7 A20 20 0 0 0 -7.2 -18.7 Z"/></g>
              <g class="sensor" id="sn-rearLeft"   transform="rotate(225)"><path class="beam" d="M-7.2 -18.7 L-61.6 -160.6 A172 172 0 0 1 61.6 -160.6 L7.2 -18.7 A20 20 0 0 0 -7.2 -18.7 Z"/></g>
              <g class="sensor" id="sn-rearRight"  transform="rotate(135)"><path class="beam" d="M-7.2 -18.7 L-61.6 -160.6 A172 172 0 0 1 61.6 -160.6 L7.2 -18.7 A20 20 0 0 0 -7.2 -18.7 Z"/></g>

              <!-- animated sonar pulses -->
              <circle class="ring sonar" r="172"/>
              <circle class="ring sonar d2" r="172"/>
            </g>
          </svg>
          <img class="car-img" src="Logo/car.png" alt="vehicle" />
          </div>
        </div>

        <!-- ---------- Right column: Heading + Attitude ---------- -->
        <div class="side-col">
          <div class="card stat compass-card">
            <div class="stat-label">Heading</div>
            <div class="compass">
              <div class="compass-ring">
                <span class="c-n">N</span><span class="c-e">E</span>
                <span class="c-s">S</span><span class="c-w">W</span>
                <div class="compass-needle" id="compassNeedle"></div>
                <div class="compass-hub"></div>
              </div>
            </div>
            <div class="compass-read"><strong id="headingValue">--°</strong> <span id="headingDir">--</span></div>
          </div>

          <div class="card stat attitude-card">
            <div class="stat-label">Attitude</div>
            <div class="horizon">
              <div class="horizon-inner" id="horizon">
                <div class="sky"></div>
                <div class="ground"></div>
                <div class="horizon-line"></div>
                <div class="pitch-ladder">
                  <span style="top:20%">10</span>
                  <span style="top:35%">5</span>
                  <span style="top:65%">5</span>
                  <span style="top:80%">10</span>
                </div>
              </div>
              <div class="horizon-mark"></div>
              <div class="horizon-bezel"></div>
            </div>
            <div class="attitude-read">
              <div>Pitch <strong id="pitchValue">--°</strong></div>
              <div>Roll <strong id="rollValue">--°</strong></div>
            </div>
          </div>
        </div>
      </section>

      <!-- ===================== Lower row ===================== -->
      <section class="lower">

        <!-- Event log -->
        <div class="card panel log-card">
          <div class="panel-title">Event Log</div>
          <ul class="event-list" id="eventList"></ul>
        </div>

        <!-- Risk level + ADAS status -->
        <div class="card panel risk-card">
          <div class="panel-title">Overall Risk Level</div>
          <div class="risk-body">
            <div class="risk-gauge" id="riskGaugeBox">
              <svg viewBox="0 0 180 104">
                <path class="risk-track" d="M16 92 A 74 74 0 0 1 164 92"/>
                <path class="risk-value" id="riskGauge" d="M16 92 A 74 74 0 0 1 164 92"/>
              </svg>
              <div class="risk-center">
                <strong id="riskLevel">--</strong>
                <small id="riskSub">--</small>
              </div>
            </div>
            <div class="adas-grid" id="adasGrid"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- ===================== Toast Container ===================== -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- ===================== Critical Popup Overlay ===================== -->
    <div id="criticalOverlay" class="critical-overlay" style="display:none">
      <div class="critical-popup">
        <div class="critical-icon" id="criticalIcon">⚠</div>
        <div class="critical-title" id="criticalTitle">CRITICAL ALERT</div>
        <div class="critical-msg" id="criticalMsg"></div>
        <div class="critical-system" id="criticalSystem"></div>
      </div>
    </div>

    <!-- ===================== Sponsors ===================== -->
    <footer class="sponsors">
      <span class="sponsors-label">Supported by</span>
      <img src="Logo/logo_TMC_png.png" alt="Tech Makers Challenge" />
      <img src="Logo/buddies_Logo.png" alt="Entrepreneur Buddies" />
      <img src="Logo/3333710_eitesal-new.png" alt="EITESAL" />
      <img src="Logo/logo_academy.png" alt="Academy" />
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
