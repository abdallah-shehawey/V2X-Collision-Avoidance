<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover + user-scalable=no: full-bleed, no pinch-zoom while driving -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f17" />
  <!-- iOS: behave like an installed app (hides the address bar when added to home) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>V2X Car · Remote</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Shown only in portrait: nudge the user to rotate the phone. -->
  <div id="rotate-hint">
    <div class="rotate-icon">⟳</div>
    <p>Rotate your phone<br /><span>landscape mode</span></p>
  </div>

  <main id="dash">
    <!-- Safety block banner: shows WHY the car refused a move (ADAS / V2N / V2P / AI) -->
    <div id="block-banner" class="block-banner" hidden>
      <span class="block-icon">⛔</span>
      <span id="block-text">BLOCKED</span>
    </div>

    <!-- Top status bar -->
    <header class="topbar">
      <div class="brand">
        <span class="dot" id="link-dot"></span>
        <span class="brand-name">V2X&nbsp;CAR</span>
      </div>
      <div class="status" id="status-text">Connecting…</div>
      <button class="icon-btn" id="wake-btn" title="Keep screen awake">☀</button>
    </header>

    <!-- Driving surface: arrows on the left, gear shifter on the right -->
    <section class="surface">
      <!-- ◄ Direction pad -->
      <div class="dpad">
        <button class="arrow up"    data-dir="F" aria-label="Forward">▲</button>
        <button class="arrow left"  data-dir="L" aria-label="Left">◄</button>
        <button class="arrow stop"  data-dir="S" aria-label="Stop">■</button>
        <button class="arrow right" data-dir="R" aria-label="Right">►</button>
        <button class="arrow down"  data-dir="B" aria-label="Backward">▼</button>
      </div>

      <!-- Center read-out -->
      <div class="readout">
        <div class="gear-label" id="gear-label">N</div>
        <div class="speed-num"><span id="speed-pct">22</span><small>%</small></div>
        <div class="dir-label" id="dir-label">IDLE</div>
      </div>

      <!-- ► Gear shifter -->
      <div class="gears" id="gears">
        <button class="gear" data-speed="0.15">1</button>
        <button class="gear" data-speed="0.30">2</button>
        <button class="gear" data-speed="0.50">3</button>
        <button class="gear" data-speed="0.75">4</button>
        <button class="gear" data-speed="1.00">5</button>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
